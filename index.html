<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Budget Planner</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

input, select, button {
  width: 90%;
  padding: 10px;
  margin: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.item {
  display: flex;
  justify-content: space-between;
  background: #334155;
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
}

.delete {
  color: red;
  cursor: pointer;
}

.warning {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>💰 Smart Budget Planner</h2>

  <input type="number" id="budget" placeholder="Set Budget">
  <button onclick="setBudget()">Set Budget</button>

  <h3>Total: ₹<span id="totalBudget">0</span></h3>
  <h3>Spent: ₹<span id="spent">0</span></h3>
  <h3>Remaining: ₹<span id="remaining">0</span></h3>
  <p id="warning" class="warning"></p>

  <input type="text" id="desc" placeholder="Expense Name">
  <input type="number" id="amount" placeholder="Amount">

  <select id="category">
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Other</option>
  </select>

  <button onclick="addExpense()">Add Expense</button>

  <div id="list"></div>

  <canvas id="chart"></canvas>
</div>

<script>
let budget = localStorage.getItem("budget") || 0;
let expenses = JSON.parse(localStorage.getItem("expensesPro")) || [];

function save() {
  localStorage.setItem("budget", budget);
  localStorage.setItem("expensesPro", JSON.stringify(expenses));
}

function setBudget() {
  budget = Number(document.getElementById("budget").value);
  save();
  render();
}

function addExpense() {
  const desc = document.getElementById("desc").value;
  const amount = Number(document.getElementById("amount").value);
  const category = document.getElementById("category").value;

  if (!desc || !amount) return alert("Fill all fields");

  expenses.push({ desc, amount, category });
  save();
  render();

  document.getElementById("desc").value = "";
  document.getElementById("amount").value = "";
}

function deleteExpense(i) {
  expenses.splice(i, 1);
  save();
  render();
}

function render() {
  document.getElementById("totalBudget").innerText = budget;

  let spent = 0;
  const list = document.getElementById("list");
  list.innerHTML = "";

  let categories = {};

  expenses.forEach((e, i) => {
    spent += e.amount;

    categories[e.category] = (categories[e.category] || 0) + e.amount;

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      ${e.desc} (₹${e.amount}) - ${e.category}
      <span class="delete" onclick="deleteExpense(${i})">❌</span>
    `;
    list.appendChild(div);
  });

  document.getElementById("spent").innerText = spent;
  document.getElementById("remaining").innerText = budget - spent;

  // Warning
  const warning = document.getElementById("warning");
  if (spent > budget) {
    warning.innerText = "⚠️ Budget Exceeded!";
  } else {
    warning.innerText = "";
  }

  // Chart
  drawChart(categories);
}

let chart;

function drawChart(data) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: Object.keys(data),
      datasets: [{
        data: Object.values(data)
      }]
    }
  });
}

render();
</script>

</body>
</html>
